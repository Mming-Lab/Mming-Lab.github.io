<!-- Contact -->
<section class="page-section" id="{{ site.data.sitetext.inquiry.section | default: "inquiry" }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ site.data.sitetext.inquiry.title | markdownify }}</h2>
        {% if site.data.sitetext.contact.text %}  
        <h3 class="section-subheading text-muted">{{ site.data.sitetext.inquiry.text | default: "" }}</h3>
        {% endif %}
      </div>
    </div>
    <!-- googleフォーム埋め込み -->
    <div class="row">
      <div class="col-lg-12 text-center">
        <div class="embed-responsive embed-responsive-16by9">
          <iframe src="{{site.data.sitetext.inquiry.forms}}" frameborder="0" marginheight="0" marginwidth="0">読み込んでいます…</iframe>
        </div>
      </div>
    </div> 
  </div>
</section>
<!-- End Contact -->
