<!-- Contact -->
<section class="bg-light page-section" id="{{ site.data.sitetext.contact.section | default: "contact" }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ site.data.sitetext.contact.title | markdownify | default: Contact Us }}</h2>
        {% if site.data.sitetext.contact.text %}  
        <h3 class="section-subheading text-muted">{{ site.data.sitetext.contact.text | default: "" }}</h3>
        {% endif %}
      </div>
    </div>
    <!-- 地図埋め込み -->
    <div class="row">
      <div class="col-lg-2"></div>
      <div class="col-lg-8 text-center">
        <div class="embed-responsive embed-responsive-16by9">
          <iframe src="{{site.data.sitetext.contact.map}}" style="border:1;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">読み込んでいます…</iframe>
        </div>
      </div>
      <div class="col-lg-2"></div>
    </div>
    <!-- 住所 -->
    <div class="row">
      <div class="col-lg-12 text-center">
        <h3 class="text-muted">{{site.data.sitetext.contact.address | default: "" }}</h3>
      </div>
    </div>
  </div>
</section>
<!-- End Contact -->
