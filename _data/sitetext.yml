about:
  title: "教室方針"
  text: "学校でも療育でもない、もう一つの居場所になるプログラミング教室"
  body: "習い事をさせたいけど…教室に入れるだろうか?理解のある関わり方をしてもらえるだろうか?そんな不安を感じたことはありませんか?プログラミング教室ミングは、「発達特性のある子どもやその家庭の選択肢を増やしたい」そんな思いで立ち上げた発達凸凹っ子や学校になじむのが難しい子どもたちが自分らしくいられる場所になるよう、環境や関わりに配慮した教室です。学校や療育機関とは異なり、子どもたちが自分らしくいられる場所を目指しています。個性に対応したアプローチ、それぞれに合わせた指導を重視して子どもたちが好きなことを追求し、その得意を伸ばすことに焦点を当てています。苦手な部分をカバーする方法についても一緒に考え、子どもたちが自信を持って成長できるようサポートしています。"
  section: about

