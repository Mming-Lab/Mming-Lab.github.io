header:
  title: プログラミング教室　mming -ミング-
  text: "2024/07開校<br />発達凸凹っ子専用クラス<br />生徒募集中!"
  button: 詳しく
  buttonlink: "#services"

services:
  title: "カリキュラム"
  text: "本校にはカリキュラム毎の料金設定はありません。色んな事に挑戦してください。"
  section: services
  list:
    - title: "toio（トイオ）"
      desc: "小さなキューブ型ロボットトイ・toio（トイオ）。toioへの命令カードを並べてプログラミングの基本構造(順次、分岐、反復)を学びます。"
      icon: fas fa-robot
    - title: "マインクラフト"
      desc: "教育版マインクラフトのコードビルダ機能をつかってプログラミングを学びます。エージェントという名のロボットにプログラミングで命令出来ます。ブロック、java script、pythonの3種類のプログラミング言語が使えます。"
      icon: fas fa-cube
    - title: "エキスパート"
      desc: "自分が作りたいアプリを作ります。プログラミング言語は自由。仕様書の読み方、情報収集のやり方を教えます。"
      icon: fas fa-code

