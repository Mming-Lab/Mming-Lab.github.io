      year: "2019"
      desc: "Ravi Riley は、Bootstrap ベースのテーマである Agency を Jekyll テーマに変換しました。Jekyll テーマは、Ruby gem として、またはリモートでインストールできます。詳細については、ドキュメントを参照してください"
      image: assets/img/timeline/3.jpg
      alt: image alt text
    - title: "タイトル"
