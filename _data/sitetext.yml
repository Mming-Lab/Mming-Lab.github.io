header:
  title: "mming -ミング-"
  text: "教育版マインクラフトでプログラミングを楽しもう！<br />発達多様性クラス募集中<br />"
  button: 詳しく
  buttonlink: "#portfolio"

about:
  title: "教室方針"
  text: "学校でも療育でもない、もう一つの居場所になるプログラミング教室"
  body: "子どもに習い事をさせたいけど…教室に入れるだろうか？理解のある関わり方をしてもらえるだろうか？そんな不安を感じたことはありませんか？プログラミング教室mmingは「発達に凸凹のある子どもやその家庭の選択肢を増やしたい」という思いで立ち上げた教室です。発達障害やグレーゾーン、学校になじむのが難しい子どもたちが自分らしくいられる場所になるよう、環境や関わりに配慮しており、アプローチや指導は子どもに応じた方法です。エンジニアが学びやすい環境の開発も行うので困り感についてもご相談ください！子どもの追求心のサポートや得意を伸ばすことに焦点を当て、お子様が自信を持って成長できるようサポートします。"
  section: about

services:
  title: "カリキュラム"
  text: "プログラミングのスキルだけでなく、お子様の「やってみたい!」「面白そう!!」から主体性や問題解決力が身に付く学びを目指しています。"
  section: services
  list:
    - title: "toio（トイオ）"
      desc: "小さなキューブ型ロボットトイ・toio（トイオ）。toioへの命令カードを並べてプログラミングの基本構造(順次、分岐、反復)を学びます。"
      icon: fas fa-robot
    - title: "マインクラフト"
      desc: "教育版マインクラフトのコードビルダ機能をつかってプログラミングを学びます。エージェントという名のロボットにプログラミングで命令出来ます。ブロック、JavaScript、Pythonの3種類のプログラミング言語が使えます。"
      icon: fas fa-cubes
    - title: "エキスパート"
      desc: "自分が作りたいアプリを作ります。プログラミング言語は自由。仕様書の読み方、情報収集のやり方を教えます。"
      icon: fas fa-code

portfolio:
  title: "詳細情報"
  #text: "特徴の詳細を説明"
  section: portfolio
  closebutton: "閉じる"

