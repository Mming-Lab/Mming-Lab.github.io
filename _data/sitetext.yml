header:
  title: "mming -ミング-"
  text: "プログラミング教室<br />2024/07開校<br />発達凸凹っ子特化クラス<br />先行募集中!"
  button: 詳しく
  buttonlink: "#services"

services:
  title: "カリキュラム"
  text: "プログラミングのスキルだけでなく、お子様の「やってみたい!」「面白そう!!」から主体性や問題解決力が身に付く学びを目指しています。"
  section: services
  list:
    - title: "toio（トイオ）"
      desc: "小さなキューブ型ロボットトイ・toio（トイオ）。toioへの命令カードを並べてプログラミングの基本構造(順次、分岐、反復)を学びます。"
      icon: fas fa-robot
    - title: "マインクラフト"
      desc: "教育版マインクラフトのコードビルダ機能をつかってプログラミングを学びます。エージェントという名のロボットにプログラミングで命令出来ます。ブロック、java script、pythonの3種類のプログラミング言語が使えます。"
      icon: fas fa-cubes
    - title: "エキスパート"
      desc: "自分が作りたいアプリを作ります。プログラミング言語は自由。仕様書の読み方、情報収集のやり方を教えます。"
      icon: fas fa-code

